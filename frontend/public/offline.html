<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e1a" />
  <title>Offline · Habito</title>
  <style>
    *, :after, :before { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0c0e1a;
      color: #f1f1f8;
      text-align: center;
      padding: max(2rem, env(safe-area-inset-top)) 2rem max(2rem, env(safe-area-inset-bottom));
      gap: 1rem;
    }
    .icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin-bottom: 0.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    h1 { font-size: 1.5rem; font-weight: 700 }
    p  { color: #8a8aa8; font-size: 0.9rem; max-width: 280px; line-height: 1.6 }
    .status {
      font-size: 0.75rem; color: #8a8aa8;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }
    .dot.online { background: #22c55e; animation: none }
    button {
      margin-top: 0.5rem;
      padding: 0.7rem 1.8rem;
      border-radius: 0.75rem;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.8 }
    @keyframes pulse {
      0%, 100% { transform: scale(1) }
      50%       { transform: scale(1.05) }
    }
    @keyframes blink {
      0%, 100% { opacity: 1 }
      50%       { opacity: 0.3 }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Habito needs a connection to load. Your data is safe and will sync when you reconnect.</p>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">No connection</span>
  </div>
  <button onclick="location.reload()">Try again</button>
  <script>
    function updateStatus() {
      const dot  = document.getElementById('dot');
      const text = document.getElementById('status-text');
      if (navigator.onLine) {
        dot.className = 'dot online';
        text.textContent = 'Back online — reloading…';
        setTimeout(function() { location.reload(); }, 800);
      } else {
        dot.className = 'dot';
        text.textContent = 'No connection';
      }
    }
    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
