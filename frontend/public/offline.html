<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · Habito</title>
  <style>
    *,:after,:before { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0c0e1a;
      color: #f1f1f8;
      text-align: center;
      padding: 2rem;
      gap: 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700 }
    p  { color: #8a8aa8; font-size: 0.9rem; max-width: 320px; line-height: 1.6 }
    button {
      margin-top: 0.5rem;
      padding: 0.65rem 1.5rem;
      border-radius: 0.75rem;
      border: none;
      background: #6d60f0;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .icon { font-size: 3rem; margin-bottom: 0.5rem }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Habito needs a connection to load. Your data is safe — reconnect and it'll sync automatically.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
